name: CI
on:
  push: {branches: [main]}
  pull_request: {}
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12"}
      - name: System deps
        run: sudo apt-get update -q && sudo apt-get install -y -q libimage-exiftool-perl
      - name: Install
        run: pip install -e .[dev]
      - name: Lint
        run: pip install ruff && ruff check ai_image_id training tests
      - name: Tests
        run: python -m pytest tests/ -v
